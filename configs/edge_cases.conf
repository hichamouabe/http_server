server {
    listen 8181;
    server_name edgecase.local;
    client_max_body_size 100;

    # tiny body limit - test 413
    location / {
        root www/static;
        index index.html;
        limit_except GET POST {
            deny all;
        }
    }

    # override body limit per location
    location /upload {
        root www/upload;
        upload_store uploads;
        client_max_body_size 2m;
        limit_except POST {
            deny all;
        }
    }

    # method not allowed - test 405
    location /readonly {
        root www/static;
        limit_except GET {
            deny all;
        }
    }

    # redirect chain
    location /step1 {
        return 301 http://localhost:8181/step2;
    }

    location /step2 {
        return 302 http://localhost:8181/;
    }
}
